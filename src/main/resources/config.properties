# ==============================================================
# Application Configuration
# ==============================================================
# All test-run settings are read from here by ConfigReader.java.
# Changing values here affects the entire suite — no code edits needed.

# The URL the browser opens at the start of every test
baseUrl=https://www.saucedemo.com

# Browser to launch: chrome | firefox | edge
browser=chrome

# Implicit wait in seconds — Selenium will poll the DOM for this long
# before throwing NoSuchElementException.
# Keep this low; prefer explicit waits (WebDriverWait) for reliability.
implicitWait=10
